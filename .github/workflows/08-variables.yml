name: 08 - Variables

on:
  push:
  workflow_dispatch:

env:
  WORKFLOW_VAR: "I am a workflow env var"

jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      JOB_VAR: "I am a job env var"

    steps:
      - name: Print Env Variables
        env:
          STEP_VAR1: "I am a step env var1"
          step_var2: "I am a step env var2"
        run: |
          echo "Step env var 1: ${{env.STEP_VAR1}}"
          echo "Step env var 2: ${{env.step_var2}}"
          echo "Job env var: ${{env.JOB_VAR}}"
          echo "Workflow env var: ${{env.WORKFLOW_VAR}}"
      - name: Overwrite Workflow Variable
        env:
          WORKFLOW_VAR: "I have been overridden at the step level"
        run: |
          echo "Workflow env var: ${{ env.WORKFLOW_VAR }}"
