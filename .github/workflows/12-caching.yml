name: 12 - Caching

on:
  workflow_dispatch:
    inputs:
      use-cache:
        description: Whether to execute cache app
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12-caching/react-app
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Download cached dependencies
        uses: actions/cache@v4
        if: ${{inputs.use-cache}}
        id: cache
        with:
          path: node_modules
          key: node-modules-${{hashFiles('12-caching/react-app/package-lock.json')}}
      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Testing
        run: npm run test
      - name: Building
        run: npm run build
      - name: Deploying to nonprod
        run: echo "Dep to nonprod"
