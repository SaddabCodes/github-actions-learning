name: 12 - Outputs

on: 
  push:
  workflow_dispatch:  

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.generate.outputs.version }}

    steps:
      - name: Generate Version
        id: generate
        run: echo "version=2.0.0" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1 # needs means the current job must wait for another job to finish before starting.
    steps:
      - name: Use Version
        run: echo "Build version is ${{ needs.job1.outputs.build_version }}"
